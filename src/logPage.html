<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log Page</title>
    <script src="main.js" defer></script>
  </head>

  <body>
    <main>
    <div class="topBar">
        <button id="reportsButton" onclick="goReportPage()">Reports</button>
        <button id="logsButton" onclick="goLogPage()">Log Data</button>
    </div>
    <div class="logsContent">
      <div class="submitDiv">
        <input type="month" id="userMonthInput" name="userMonthInput">
        <div id="selectedMonthYears"></div>
        <button id="submitReportButton" onclick="submitReport()">Submit -></button>
      </div>

      <div class="favoriteBanks">
        <h3>Favorites</h3>
        <div id="favoriteBanksList"></div>
      </div>

      <div class="searchBanks">
        <div id="searchBanksList"></div>
        <div class="searchControls">
          <input type="text" id="bankSearchInput" placeholder="Search banks..." />
          <button id="bankSearchButton" onclick="searchBanks()">Search</button>
        </div>
      </div>
    </div>
    </main>
  </body>
</html>
