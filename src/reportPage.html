<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report Page</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="main.js" defer></script>
  </head>
  <body onload="initReportPage()">
    <main>
    <div class="topBar">
      <button id="reportsButton" onclick="goReportPage()">Reports</button>
      <button id="logsButton" onclick="goLogPage()">Log Data</button>
    </div>
    <div class="reportsContent">
      <div class="monthsReport">
        <label id="rangeSelect">
          Select Year: 
          <input type="number" id="yearInput" min="1900" max="2100" placeholder="YYYY">
          Or select Date Range:
          <input type="month" id="startRange">
          <input type="month" id="endRange">
        </label>
        <button onclick="updateSelection()">Submit</button>
        <div id="lineChartData"></div>
      </div>
      <div class="purchaseCategories">
        <div id="purchaseCategoriesData"></div>
      </div>
      <div class="userInsights">
        <div id="insightsData"></div>
      </div>
    </div>
    </main>
  </body>
</html>
